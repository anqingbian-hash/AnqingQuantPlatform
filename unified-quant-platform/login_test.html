<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 量化交易平台 - 登录测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #495057;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border-left: 4px solid #28a745;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            display: block;
        }
        .result pre {
            background: white;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
        }
        .info-box {
            background: #d1ecf1;
            border-left: 4px solid #17a2b8;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #0c5460;
        }
        .loading {
            text-align: center;
            color: #6c757d;
            display: none;
            margin-top: 20px;
        }
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 OpenClaw 登录测试</h1>

        <div class="info-box">
            <strong>测试账户：</strong><br>
            用户名：admin<br>
            密码：admin123
        </div>

        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" value="admin">
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" value="admin123">
        </div>

        <button class="btn" id="loginBtn" onclick="testLogin()">🔑 登录测试</button>

        <div class="loading" id="loading">登录中...</div>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            console.log('开始登录测试...');
            console.log('用户名:', username);
            console.log('密码:', password);

            if (!username || !password) {
                alert('请输入用户名和密码！');
                return;
            }

            // 禁用按钮，显示加载
            loginBtn.disabled = true;
            loading.classList.add('show');
            result.className = 'result';
            result.style.display = 'none';

            try {
                console.log('发送请求到: /api/auth/login');

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                console.log('响应状态:', response.status);
                console.log('响应头:', response.headers);

                const data = await response.json();
                console.log('响应数据:', data);

                // 隐藏加载，显示结果
                loading.classList.remove('show');
                loginBtn.disabled = false;

                if (data.success) {
                    result.className = 'result success';
                    result.innerHTML = `
                        <h3>✅ 登录成功！</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    result.className = 'result error';
                    result.innerHTML = `
                        <h3>❌ 登录失败</h3>
                        <p>${data.message}</p>
                        <pre>请检查用户名和密码<br>默认账户: admin / admin123</pre>
                    `;
                }
            } catch (error) {
                console.error('登录错误:', error);

                // 隐藏加载，显示错误
                loading.classList.remove('show');
                loginBtn.disabled = false;

                result.className = 'result error';
                result.innerHTML = `
                    <h3>❌ 请求失败</h3>
                    <p><strong>错误信息:</strong> ${error.message}</p>
                    <p><strong>错误详情:</strong> ${error}</p>
                    <p>请检查：<br>
                    1. 网络连接是否正常<br>
                    2. 服务器是否运行 (http://localhost:7000)<br>
                    3. 是否有跨域问题<br>
                    4. 浏览器控制台是否有错误</p>
                `;
            }
        }

        // 页面加载时测试连接
        window.onload = function() {
            console.log('页面加载完成');
            console.log('当前URL:', window.location.href);
            console.log('服务器地址:', window.location.origin);

            // 测试服务器连接
            fetch('/')
                .then(response => {
                    console.log('服务器连接成功');
                    console.log('状态码:', response.status);
                })
                .catch(error => {
                    console.error('服务器连接失败:', error);
                    document.getElementById('result').className = 'result error';
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('result').innerHTML = `
                        <h3>❌ 无法连接服务器</h3>
                        <p>请确保服务器正在运行: http://localhost:7000</p>
                    `;
                });
        };
    </script>
</body>
</html>
