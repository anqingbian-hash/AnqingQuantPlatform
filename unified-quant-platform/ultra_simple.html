<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw 登录</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .field {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background: #5568d3;
        }
        .msg {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #17a2b8;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔐 登录</h1>

        <div class="info">
            <strong>账户信息：</strong><br>
            用户名：admin<br>
            密码：admin123
        </div>

        <div class="field">
            <label>用户名：</label>
            <input type="text" id="username" value="admin">
        </div>

        <div class="field">
            <label>密码：</label>
            <input type="password" id="password" value="admin123">
        </div>

        <button onclick="login()">登录</button>

        <div class="msg" id="message"></div>
    </div>

    <script>
        function login() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var msgDiv = document.getElementById('message');

            console.log('开始登录');
            console.log('用户名:', username);
            console.log('密码:', password);

            if (!username || !password) {
                msgDiv.className = 'msg error';
                msgDiv.style.display = 'block';
                msgDiv.innerHTML = '请输入用户名和密码';
                return;
            }

            msgDiv.style.display = 'none';

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/auth/login', true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onreadystatechange = function() {
                console.log('状态:', xhr.readyState);
                console.log('状态码:', xhr.status);

                if (xhr.readyState === 4) {
                    msgDiv.style.display = 'block';

                    if (xhr.status === 200) {
                        try {
                            var response = JSON.parse(xhr.responseText);
                            console.log('响应:', response);

                            if (response.success) {
                                msgDiv.className = 'msg success';
                                msgDiv.innerHTML = '登录成功！欢迎 ' + response.user.username;
                                alert('登录成功！');
                            } else {
                                msgDiv.className = 'msg error';
                                msgDiv.innerHTML = '登录失败：' + response.message;
                            }
                        } catch (e) {
                            msgDiv.className = 'msg error';
                            msgDiv.innerHTML = '服务器返回数据错误：' + xhr.responseText;
                            console.error('解析错误:', e);
                        }
                    } else {
                        msgDiv.className = 'msg error';
                        msgDiv.innerHTML = '请求失败，状态码：' + xhr.status;
                        console.error('请求失败');
                    }
                }
            };

            xhr.onerror = function() {
                msgDiv.className = 'msg error';
                msgDiv.style.display = 'block';
                msgDiv.innerHTML = '网络错误，请检查连接';
                console.error('网络错误');
            };

            try {
                var data = {
                    username: username,
                    password: password
                };
                console.log('发送数据:', data);
                xhr.send(JSON.stringify(data));
            } catch (e) {
                msgDiv.className = 'msg error';
                msgDiv.style.display = 'block';
                msgDiv.innerHTML = '发送请求失败：' + e.message;
                console.error('发送错误:', e);
            }
        }

        // 测试服务器连接
        window.onload = function() {
            console.log('页面加载完成');
            console.log('当前URL:', window.location.href);

            var testXhr = new XMLHttpRequest();
            testXhr.open('GET', '/', true);
            testXhr.onreadystatechange = function() {
                if (testXhr.readyState === 4) {
                    console.log('服务器连接测试:', testXhr.status);
                    if (testXhr.status !== 200) {
                        var msgDiv = document.getElementById('message');
                        msgDiv.className = 'msg error';
                        msgDiv.style.display = 'block';
                        msgDiv.innerHTML = '无法连接服务器，请确保服务器正在运行';
                    }
                }
            };
            testXhr.send();
        };
    </script>
</body>
</html>
