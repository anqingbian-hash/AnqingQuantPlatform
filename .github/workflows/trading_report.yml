name: 交易报告自动生成

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: 报告类型
        required: false
        default: full
        type: choice
        options:
          - full
          - morning
          - afternoon
          - funding
      test_mode:
        description: 测试模式（不推送飞书）
        required: false
        default: false
        type: boolean

jobs:
  generate_report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout代码
        uses: actions/checkout@v3

      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          cd FundsMonitor
          pip install -q akshare pandas numpy matplotlib seaborn yfinance litellm

      - name: 运行完整工作流
        run: |
          python3 .github/scripts/generate_report.py

      - name: 上传报告产物
        uses: actions/upload-artifact@v3
        with:
          name: trading-report-${{ github.run_number }}
          path: FundsMonitor/output/
          retention-days: 7

      - name: 发送成功通知
        if: success()
        run: |
          echo "交易报告生成成功！"
          echo "报告类型: ${{ github.event.inputs.report_type || 'full' }}"
          echo "产物: trading-report-${{ github.run_number }}"

      - name: 发送失败通知
        if: failure()
        run: |
          echo "交易报告生成失败！"
          echo "请检查日志了解详情"
