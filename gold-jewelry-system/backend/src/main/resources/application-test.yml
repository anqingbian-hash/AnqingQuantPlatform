# 测试环境配置

server:
  port: 8080

spring:
  application:
    name: gold-jewelry-management-system-test

  # 数据源配置 - 测试数据库
  datasource:
    url: jdbc:mysql://localhost:3306/gold_jewelry_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: false
    show-sql-comments: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

# 日志配置
logging:
  level:
    root: INFO
    com.goldjewelry: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/gold-jewelry-test.log
    max-size: 10MB
    max-history: 30

# 应用配置
app:
  name: 黄金白银贵金属首饰管理系统（测试环境）
  environment: test
